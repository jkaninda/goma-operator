                        to express the family of an IP expressed by a type (e.g. service.spec.ipFamilies).
                      type: string
                    type: array
                  ipFamilyPolicy:
                    description: 'IPFamilyPolicy: SingleStack, PreferDualStack, or
                      RequireDualStack.'
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels are merged onto the Service.
                    type: object
                  loadBalancerClass:
                    description: |-
                      LoadBalancerClass selects a specific LB implementation
                      (e.g. "service.k8s.aws/nlb").
                    type: string
                  loadBalancerIP:
                    description: LoadBalancerIP requests a specific static IP (cloud-dependent).
                    type: string
                  loadBalancerSourceRanges:
                    description: LoadBalancerSourceRanges restricts LoadBalancer access
                      to specific CIDRs.
                    items:
                      type: string
                    type: array
                  sessionAffinity:
                    description: 'SessionAffinity: None (default) or ClientIP.'
                    enum:
                    - None
                    - ClientIP
                    type: string
                  type:
                    default: ClusterIP
                    description: 'Type is the Service type: ClusterIP, NodePort, or
                      LoadBalancer.'
                    enum:
                    - ClusterIP
                    - NodePort
                    - LoadBalancer
                    type: string
                type: object
            type: object
          status:
            description: GatewayStatus defines the observed state of Gateway.
            properties:
              addresses:
                description: |-
                  Addresses is the list of addresses at which the gateway is reachable.
                  Populated from the Service status (LoadBalancer ingress, external IPs,
                  node IPs with NodePort, or cluster IP depending on Service type).
                items:
                  description: GatewayAddress is a single reachable address for the
                    gateway.
                  properties:
                    type:
                      description: 'Type is the address type: "IPAddress" or "Hostname".'
                      enum:
                      - IPAddress
                      - Hostname
                      type: string
                    value:
                      description: Value is the address itself (IP literal or DNS
                        name).
                      type: string
                  required:
                  - type
                  - value
                  type: object
                type: array
              conditions:
                description: Conditions represent the latest available observations
                  of the Gateway's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configChecksum:
                description: ConfigChecksum is the SHA256 checksum of the generated
                  config.
                type: string
              middlewares:
                description: Middlewares is the number of Middleware CRs referenced
                  by the routes.
                format: int32
                type: integer
              readyReplicas:
                description: ReadyReplicas is the number of ready gateway pods.
                format: int32
                type: integer
              replicas:
                description: Replicas is the current number of gateway pods.
                format: int32
                type: integer
              routes:
                description: Routes is the number of Route CRs associated with this
                  gateway.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
