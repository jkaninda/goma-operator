name: Release
on:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get the tag name
        id: get_tag_name
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ${{ vars.BUILDKIT_IMAGE }}:${{ env.VERSION }}
            ${{ vars.BUILDKIT_IMAGE }}:latest

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate install.yaml and CRDs
        run: |
          cd config/manager && \
          ../../bin/kustomize edit set image controller=${{ vars.BUILDKIT_IMAGE }}:${{ env.TAG_NAME }} || \
          (make -C ../.. kustomize && ../../bin/kustomize edit set image controller=${{ vars.BUILDKIT_IMAGE }}:${{ env.TAG_NAME }})
          cd ../..
          make build-installer
          mkdir -p dist
          $(pwd)/bin/kustomize build config/crd > dist/crds.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: |
            dist/install.yaml
            dist/crds.yaml
